<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Laser Gate Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #f0f0f0; }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }
        .label {
            background: rgba(255, 255, 255, 0.85);
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            pointer-events: auto;
        }
        h1 { margin: 0 0 5px 0; font-size: 18px; color: #d32f2f; }
        p { margin: 0; font-size: 14px; color: #555; }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #888;
            font-size: 12px;
            pointer-events: none;
        }
        #loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="loading">Đang tải mô hình 3D...</div>

<div id="ui-container">
    <div class="label">
        <h1>CỔNG QUANG LASER EDISON</h1>
        <p>Thiết bị thí nghiệm vật lý chính xác cao</p>
    </div>
</div>

<div class="controls-hint">
    Chuột trái: Xoay 360° | Chuột phải: Di chuyển | Cuộn: Phóng to/thu nhỏ
</div>

<script>
    let scene, camera, renderer, controls;

    function init() {
        // 1. Tạo Scene (Cảnh)
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf8f9fa);

        // 2. Tạo Camera
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 4, 8);

        // 3. Renderer
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 4. Ánh sáng
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Ánh sáng phụ phía sau để làm nổi bật khối 3D
        const backLight = new THREE.PointLight(0xffffff, 0.5);
        backLight.position.set(-5, 2, -5);
        scene.add(backLight);

        // 5. Điều khiển OrbitControls
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 6. Tạo mô hình Cổng Quang
        createLaserGate();

        // Xử lý resize cửa sổ
        window.addEventListener('resize', onWindowResize, false);
        
        // Ẩn màn hình loading
        document.getElementById('loading').style.display = 'none';

        animate();
    }

    function createLaserGate() {
        const gateGroup = new THREE.Group();

        // Chất liệu nhựa đỏ (như ảnh chụp)
        const redPlasticMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xd32f2f, 
            roughness: 0.3, 
            metalness: 0.1 
        });

        // 6.1 Khung chữ U (3 khối ghép lại)
        // Chân trái
        const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.8, 3, 1), redPlasticMaterial);
        leftLeg.position.set(-1.6, 0, 0);
        leftLeg.castShadow = true;
        gateGroup.add(leftLeg);

        // Chân phải
        const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.8, 3, 1), redPlasticMaterial);
        rightLeg.position.set(1.6, 0, 0);
        rightLeg.castShadow = true;
        gateGroup.add(rightLeg);

        // Thanh ngang trên
        const topBar = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.8, 1), redPlasticMaterial);
        topBar.position.set(0, 1.1, 0);
        topBar.castShadow = true;
        gateGroup.add(topBar);

        // 6.2 Nhãn dán EDISON (Mặt trước chân trái)
        const stickerGeo = new THREE.PlaneGeometry(0.6, 2.4);
        const canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, 128, 512);
        ctx.fillStyle = '#d32f2f';
        ctx.font = 'bold 30px Arial';
        ctx.textAlign = 'center';
        // Vẽ chữ dọc
        ctx.save();
        ctx.translate(64, 256);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText('EDISON', 0, 0);
        ctx.restore();
        // Vẽ logo nhỏ giả định
        ctx.fillStyle = 'blue';
        ctx.beginPath(); ctx.arc(64, 450, 20, 0, Math.PI * 2); ctx.fill();
        
        const stickerTex = new THREE.CanvasTexture(canvas);
        const stickerMat = new THREE.MeshBasicMaterial({ map: stickerTex, side: THREE.DoubleSide });
        const sticker = new THREE.Mesh(stickerGeo, stickerMat);
        sticker.position.set(-1.6, 0, 0.51); // Hơi nhô ra khỏi mặt nhựa
        gateGroup.add(sticker);

        // 6.3 Mắt cảm biến Laser
        const sensorGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.1, 32);
        const sensorMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        
        const sensorLeft = new THREE.Mesh(sensorGeo, sensorMat);
        sensorLeft.rotation.z = Math.PI / 2;
        sensorLeft.position.set(-1.2, -0.5, 0);
        gateGroup.add(sensorLeft);

        const sensorRight = new THREE.Mesh(sensorGeo, sensorMat);
        sensorRight.rotation.z = Math.PI / 2;
        sensorRight.position.set(1.2, -0.5, 0);
        gateGroup.add(sensorRight);

        // 6.4 Dây cáp USB (Mô phỏng bằng Curve)
        const curve = new THREE.CatmullRomCurve3([
            new THREE.Vector3(0, 1.5, 0),
            new THREE.Vector3(0.5, 2.5, 0.5),
            new THREE.Vector3(-0.5, 3.0, -0.5),
            new THREE.Vector3(0.8, 3.2, 0.2),
            new THREE.Vector3(1.5, 2.8, 0.8)
        ]);
        const tubeGeo = new THREE.TubeGeometry(curve, 64, 0.08, 8, false);
        const tubeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const wire = new THREE.Mesh(tubeGeo, tubeMat);
        gateGroup.add(wire);

        // Đầu cắm USB
        const usbHead = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.6), new THREE.MeshStandardMaterial({color: 0x333333}));
        usbHead.position.set(1.6, 2.8, 0.8);
        gateGroup.add(usbHead);

        // 6.5 Mặt sàn để đổ bóng
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.ShadowMaterial({ opacity: 0.1 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -1.5;
        floor.receiveShadow = true;
        scene.add(floor);

        scene.add(gateGroup);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    window.onload = init;
</script>
</body>
</html>
